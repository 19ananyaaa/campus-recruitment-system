<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Hub - Sign Up</title>
    <!-- Step 1: Bootstrap aur custom CSS add karna -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
    <!-- Step 2: Simple Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">Campus Hub</a>
            <!-- Step: 'Base UI Theme' ko 'Dark Mode' me replace kiya -->
            <button id="darkModeBtn" class="btn btn-outline-light btn-sm ms-auto"><i class="bi bi-moon"></i> Enable Dark Mode</button>
        </div>
    </nav>

    <!-- Step 3: Registration Form layout -->
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5 mt-5">
                <div class="card shadow-lg p-4 custom-card">
                    <h3 class="text-center mb-4">Create Account</h3>
                    
                    <div id="signupAlert" class="alert d-none"></div>

                    <form id="signupForm">
                        <div class="mb-3">
                            <label for="regEmail" class="form-label">College Email</label>
                            <input type="email" class="form-control" id="regEmail" required placeholder="e.g. rohan@student.com">
                        </div>
                        <div class="mb-3">
                            <label for="regPassword" class="form-label">Password</label>
                            <input type="password" class="form-control" id="regPassword" required placeholder="Create a strong password">
                        </div>
                        <button type="submit" class="btn btn-success w-100 fw-bold">Sign Up</button>
                    </form>
                    
                    <div class="text-center mt-3">
                        <small>Already registered? <a href="index.html">Login here</a></small>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Step 4: Logic aur fetch calls include karna -->
    <script src="script.js"></script>
</body>
</html>
