<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Hub - Login</title>
    <!-- Step 1: Bootstrap add karna UI ko sundar banane ke liye -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
    <!-- Step 2: Navbar section with Dark Mode toggle -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">Campus Hub</a>
            <!-- Step: 'Base UI Theme' ko 'Dark Mode' me replace kiya -->
            <button id="darkModeBtn" class="btn btn-outline-light btn-sm ms-auto"><i class="bi bi-moon"></i> Enable Dark Mode</button>
        </div>
    </nav>

    <!-- Step 3: Login Form Layout -->
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5 mt-5">
                <div class="card shadow-lg p-4 custom-card">
                    <h3 class="text-center mb-4">Welcome Back!</h3>
                    <!-- Alert box successful/error messages ke liye -->
                    <div id="loginAlert" class="alert d-none"></div>

                    <form id="loginForm">
                        <div class="mb-3">
                            <label for="email" class="form-label">Email address</label>
                            <input type="email" class="form-control" id="email" required placeholder="student@college.com or admin@campus.com">
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" class="form-control" id="password" required placeholder="Enter password">
                        </div>
                        <button type="submit" class="btn btn-primary w-100 fw-bold">Login</button>
                    </form>
                    
                    <div class="text-center mt-3">
                        <small>Don't have an account? <a href="signup.html">Sign Up here</a></small>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Step 4: Backend se connect aur logic ke liye JS include karna -->
    <script src="script.js"></script>
</body>
</html>
